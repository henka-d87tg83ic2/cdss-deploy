<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>4象限分析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
body{font-family:sans-serif;margin:20px;background:#fff;color:#111}
h2{font-size:16px;font-weight:500;margin:0 0 12px}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
button{padding:4px 12px;font-size:13px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer}
button.active{background:#f0f0f0;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:#f7f7f5;border-radius:8px;padding:10px 12px}
.stat-label{font-size:11px;color:#666;margin-bottom:2px}
.stat-val{font-size:20px;font-weight:500}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-box{border:1px solid #e0e0e0;border-radius:8px;padding:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f7f7f5;padding:5px 8px;text-align:left;border-bottom:1px solid #e0e0e0;font-weight:500}
td{padding:5px 8px;border-bottom:1px solid #f0f0f0}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:600}
</style>
</head>
<body>
<h2>CDSS 4象限ドリル分析</h2>
<div class="ctrl" id="dsel">
  <button class="active" onclick="setDisease('all',this)">全疾患</button>
  <button onclick="setDisease('cardiac',this)">cardiac</button><button onclick="setDisease('stroke',this)">stroke</button><button onclick="setDisease('cancer',this)">cancer</button><button onclick="setDisease('pneumonia',this)">pneumonia</button><button onclick="setDisease('fracture',this)">fracture</button><button onclick="setDisease('infection',this)">infection</button>
</div>
<div class="stats">
  <div class="stat"><div class="stat-label">TP</div><div class="stat-val" id="s-tp" style="color:#378ADD">—</div></div>
  <div class="stat"><div class="stat-label">TN</div><div class="stat-val" id="s-tn" style="color:#1D9E75">—</div></div>
  <div class="stat"><div class="stat-label">FP</div><div class="stat-val" id="s-fp" style="color:#E24B4A">—</div></div>
  <div class="stat"><div class="stat-label">FN</div><div class="stat-val" id="s-fn" style="color:#EF9F27">—</div></div>
</div>
<div class="charts">
  <div class="chart-box"><h2>lactate × albumin 散布図</h2>
    <div style="position:relative;height:260px"><canvas id="scatter" role="img" aria-label="lactate vs albumin scatter by outcome"></canvas></div>
  </div>
  <div class="chart-box"><h2>疾患別 AUC</h2>
    <div style="position:relative;height:260px"><canvas id="auc" role="img" aria-label="AUC by disease"></canvas></div>
  </div>
</div>
<h2>症例ドリル（クリックで詳細）</h2>

const COLORS = {"cardiac": "#378ADD", "stroke": "#D4537E", "cancer": "#D85A30", "pneumonia": "#1D9E75", "fracture": "#BA7517", "infection": "#7F77DD"};
const AUC = {"cardiac": 0.731, "stroke": 0.5, "cancer": 0.548, "pneumonia": 0.641, "fracture": 0.603, "infection": 0.641};
const QUAD_C = {TP:"#378ADD",TN:"#1D9E75",FP:"#E24B4A",FN:"#EF9F27"};
let curDisease = "all";
let scatter, aucChart;

function setDisease(d, btn) {
  curDisease = d;
  document.querySelectorAll('#dsel button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const rows = curDisease==="all" ? ALL : ALL.filter(r=>r.disease===curDisease);
  const cnt = q => rows.filter(r=>r.quad===q).length;
  document.getElementById('s-tp').textContent = cnt('TP');
  document.getElementById('s-tn').textContent = cnt('TN');
  document.getElementById('s-fp').textContent = cnt('FP');
  document.getElementById('s-fn').textContent = cnt('FN');

  const datasets = Object.entries(QUAD_C).map(([q,c])=>{
    const pts = rows.filter(r=>r.quad===q && r.lactate!=null && r.albumin!=null)
                    .map(r=>{return{x:r.lactate,y:r.albumin,id:r.id,disease:r.disease}});
    return{label:q, data:pts, backgroundColor:c+'aa', pointRadius:6, pointHoverRadius:8};
  });
  if(scatter) scatter.destroy();
  scatter = new Chart(document.getElementById('scatter'),{
    type:'scatter',
    data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},
      scales:{
        x:{title:{display:true,text:'lactate (mmol/L)'},min:0},
        y:{title:{display:true,text:'albumin (g/dL)'},min:1,max:5}
      }
    }
  });

  const diseases = curDisease==="all" ? ["cardiac", "stroke", "cancer", "pneumonia", "fracture", "infection"] : [curDisease];
  const aucVals = diseases.map(d=>AUC[d]??0);
  const aucColors = diseases.map(d=>COLORS[d]??'#888');
  if(aucChart) aucChart.destroy();
  aucChart = new Chart(document.getElementById('auc'),{
    type:'bar',
    data:{
      labels:diseases,
      datasets:[{
        label:'AUC',data:aucVals,
        backgroundColor:aucColors,
        borderRadius:4
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{y:{min:0,max:1,ticks:{callback:v=>v.toFixed(2)}}}
    }
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(r=>{
    const qc = QUAD_C[r.quad];
    tbody.innerHTML += `<tr>
      <td style="font-size:11px">${r.id}</td>
      <td><span style="color:${COLORS[r.disease]};font-weight:500">${r.disease}</span></td>
      <td>${r.lactate??'—'}</td>
      <td>${r.albumin??'—'}</td>
      <td>${r.z}</td>
      <td>${r.thr}</td>
      <td>${r.actual===1?'死亡':'生存'}</td>
      <td>${r.pred===1?'死亡':'生存'}</td>
      <td><span class="tag" style="background:${qc}22;color:${qc}">${r.quad}</span></td>
    </tr>`;
  });
}
render();
</script>
